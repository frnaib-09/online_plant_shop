<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantition - World's best online plant store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-secondary fixed-top">
            <div class="container">
                <a class="navbar-brand brand" href="#">Plantition</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav m-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active navname" aria-current="page" href="./index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active navname" aria-current="page" href="./about.html">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active navname" aria-current="page" href="./product.html">Product</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active navname" aria-current="page" href="./contact.html">Contact</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 w-100" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="contact" class="my-5">
            <div class="container py-5">
                <h1 class="text-center py-2">Contact Us</h1>
                <div class="row">
                    <form>
                        <label for="name">Your Name *</label>
                        <input type="text" name="name" id="name" class="form-control w-100 my-3" placeholder="John Doe">
                        <span class="text-danger" id="nameError"></span><br>

                        <label for="email">Your E-mail *</label>
                        <input type="email" name="email" id="email" class="form-control w-100 my-3" placeholder="john.doe452@yandex.com">
                        <span class="text-danger" id="emailError"></span><br>

                        <label for="msg">Your Queries</label>
                        <textarea name="msg" id="message" class="form-control w-100 my-3" rows="5" placeholder="Lorem ipsum dolor sin..."></textarea>
                        <span class="text-danger" id="messageError"></span><br>

                        <button class="submitbtn btn btn-primary w-100 my-3" type="submit">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4">
        <div class="container">
            <div>&copy; 2026 Plantition. All Rights reserved.</div>
        </div>
    </footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./js/script.js"></script>


</body>
</html>
